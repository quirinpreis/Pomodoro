<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Pomodoro Timer | 50:10</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div class="background-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <main class="container">
        <div class="glass-card">
            <header>
                <div class="header-top">
                    <h1 id="status-label">Work Session</h1>
                    <button id="settings-btn" class="btn-icon">
                        <svg viewBox="0 0 24 24" width="24" height="24">
                            <path fill="currentColor"
                                d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                        </svg>
                    </button>
                </div>
                <div id="session-info-clickable" class="session-info clickable">
                    <p id="session-name">Session #1</p>
                    <p id="session-desc-preview" class="desc-preview">Add a description...</p>
                </div>
            </header>

            <div class="timer-display">
                <svg class="progress-ring" width="300" height="300">
                    <circle class="progress-ring-bg" stroke="rgba(255, 255, 255, 0.1)" stroke-width="8"
                        fill="transparent" r="140" cx="150" cy="150" />
                    <circle id="progress-bar" class="progress-ring-bar" stroke="var(--primary-color)" stroke-width="8"
                        stroke-linecap="round" fill="transparent" r="140" cx="150" cy="150" />
                </svg>
                <div id="time-left" class="time">50:00</div>
            </div>

            <div class="controls">
                <button id="start-btn" class="btn btn-primary">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M8 5v14l11-7z" />
                    </svg>
                    <span>Start</span>
                </button>
                <button id="pause-btn" class="btn btn-secondary" disabled>
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
                    </svg>
                    <span>Pause</span>
                </button>
                <button id="reset-btn" class="btn btn-outline">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor"
                            d="M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z" />
                    </svg>
                </button>
            </div>
        </div>
    </main>

    <div id="confetti-container" class="confetti-container"></div>

    <!-- Modals -->
    <div id="session-modal" class="modal-overlay">
        <div class="modal glass-card">
            <h2>Current Session</h2>
            <div class="input-group">
                <label for="input-session-name">Name</label>
                <input type="text" id="input-session-name" placeholder="E.g. Study Physics">
            </div>
            <div class="input-group">
                <label for="input-session-desc">Description</label>
                <textarea id="input-session-desc" rows="3" placeholder="What are you working on?"></textarea>
            </div>
            <div class="modal-actions">
                <button id="close-session-modal" class="btn btn-secondary">Cancel</button>
                <button id="save-session-btn" class="btn btn-primary">Save Changes</button>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal-overlay">
        <div class="modal glass-card wide">
            <div class="modal-header">
                <h2>Session History</h2>
                <button id="close-history-modal" class="btn-icon">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path fill="currentColor"
                            d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z" />
                    </svg>
                </button>
            </div>
            <div id="history-list" class="history-list">
                <!-- History items will be injected here -->
                <div class="empty-state">No sessions recorded yet.</div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
